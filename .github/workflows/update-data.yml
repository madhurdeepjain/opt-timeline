name: Update timeline data

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          persist-credentials: true

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install scraper dependencies
        working-directory: scraper
        run: uv sync

      - name: Run scraper
        working-directory: scraper
        run: uv run scrape

      - name: Copy CSV to dashboard data dir
        run: cp scraper/out/timeline.csv dashboard/data/timeline.csv

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data/timeline.csv
          # Only commit if something changed
          git diff --cached --quiet || git commit -m "chore: update timeline data $(date -u +%Y-%m-%d)"
          git push
