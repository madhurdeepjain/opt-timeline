name: Update timeline data

# Runs the scraper on a schedule and writes results to Supabase.
# No data is committed back to the repo — Supabase is the source of truth.
on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch: {} # manual trigger

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: reddit-cookie

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Run scraper → Supabase
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          REDDIT_COOKIE: ${{ secrets.REDDIT_COOKIE }}
        run: |
          uv sync
          uv run scrape --yes
